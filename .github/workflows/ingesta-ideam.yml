name: ingesta-ideam

# Cadencias por tipo de fuente (UTC; Colombia = UTC-5).
# Ajusta a tu necesidad real; no sobre-encuestes.
on:
  schedule:
    # Alertas/observación (ArcGIS): cada 2 h en ventana diurna local (~06:00–22:00 COL => 11–03 UTC)
    - cron: "0 11,13,15,17,19,21,23,1,3 * * *"
    # Alertas BART, DANE, CPT/WRF, GFS: 2 veces/día (~13:05 y ~19:05 COL)
    - cron: "5 18,0 * * *"
  workflow_dispatch:
    inputs:
      arbol_alertas:
        description: "Regenerar también el mapa de auditoría del árbol completo de Alertas (lento, ~5-10 min)"
        type: boolean
        default: false

permissions:
  contents: write          # para commitear los snapshots al repo (opción simple)

concurrency:
  group: ingesta-ideam
  cancel-in-progress: false

jobs:
  extraer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install pandas pyarrow requests openpyxl pyshp oss2

      - name: Seleccionar fuentes según la hora
        id: plan
        run: |
          HOUR=$(date -u +%H)
          # Las corridas "pesadas" (2/día) caen en 18 y 00 UTC -> todo.
          if [ "$HOUR" = "18" ] || [ "$HOUR" = "00" ]; then
            echo "args=--all" >> "$GITHUB_OUTPUT"
            echo "pesada=1" >> "$GITHUB_OUTPUT"
          else
            echo "args=--vector --verify" >> "$GITHUB_OUTPUT"   # solo alertas/obs
            echo "pesada=0" >> "$GITHUB_OUTPUT"
          fi
          # WRF/GFS (grillas) y CPT (predicción estacional) solo 1 vez/día.
          if [ "$HOUR" = "00" ]; then
            echo "diaria=1" >> "$GITHUB_OUTPUT"
          else
            echo "diaria=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Ejecutar extractor base (ArcGIS)
        env:
          IDEAM_DATA_ROOT: data_lake
          # OSS opcional: define estos secrets para espejar a Alibaba bronze.
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: python ideam_extractor.py ${{ steps.plan.outputs.args }}

      - name: Alertas BART (/ospa/Alertas/, categorías + modelos)
        if: steps.plan.outputs.pesada == '1'
        env:
          IDEAM_DATA_ROOT: data_lake
        run: python bart_alertas.py --diarias

      - name: Mapa de auditoría del árbol de Alertas (solo manual, es lento)
        if: github.event.inputs.arbol_alertas == 'true'
        env:
          IDEAM_DATA_ROOT: data_lake
        run: python bart_alertas.py --tree

      - name: DANE DIVIPOLA
        if: steps.plan.outputs.diaria == '1'
        env:
          IDEAM_DATA_ROOT: data_lake
        run: python dane_terridata.py

      - name: CPT (predicción estacional) y grillas WRF/GFS
        if: steps.plan.outputs.diaria == '1'
        env:
          IDEAM_DATA_ROOT: data_lake
        run: python ideam_wrf_cpt.py --cpt --wrf

      - name: Regenerar api/datasets.json
        if: steps.plan.outputs.pesada == '1'
        run: python scripts/generar_api_datasets.py --repo "${{ github.repository }}"

      - name: Commitear snapshots nuevos
        run: |
          git config user.name  "ingesta-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data_lake api
          if git diff --cached --quiet; then
            echo "Sin cambios que commitear."
          else
            git commit -m "ingesta: snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
